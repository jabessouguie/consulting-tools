name: CI/CD - Consulting Tools Consulting Tools

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Manual trigger

jobs:
  # ==========================================
  # JOB 1: TESTS UNITAIRES
  # ==========================================
  test:
    name: Tests Unitaires (Python 3.13)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.13']  # Python 3.14 causes lxml issues

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock pytest-asyncio httpx

      - name: 🧪 Run tests
        run: |
          pytest tests/ -q --tb=short --cov=agents --cov=utils --cov-report=xml --cov-report=term --cov-fail-under=15

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ==========================================
  # JOB 2: LINT & CODE QUALITY
  # ==========================================
  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: 📦 Install linters
        run: |
          pip install flake8 black isort

      - name: 🔍 Flake8 (Style check)
        run: |
          # Stop build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics
        continue-on-error: true

      - name: 🎨 Black (Code formatter check)
        run: |
          black --check --diff .
        continue-on-error: true

      - name: 📦 isort (Import sorting check)
        run: |
          isort --check-only --diff .
        continue-on-error: true

  # ==========================================
  # JOB 3: SECURITY SCAN
  # ==========================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 🔒 Run Bandit (Security scanner)
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . -f screen
        continue-on-error: true

      - name: 📤 Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ==========================================
  # JOB 4: DEPENDENCY CHECK
  # ==========================================
  dependencies:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt

      - name: 🛡️ Run Safety check
        run: |
          pip install safety
          safety check --json || true
        continue-on-error: true

  # ==========================================
  # JOB 5: BUILD VALIDATION
  # ==========================================
  build:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt

      - name: ✅ Validate Python syntax
        run: |
          python -c "import ast; ast.parse(open('app.py').read())"
          python -c "import ast; ast.parse(open('utils/gmail_client.py').read())"
          python -c "import ast; ast.parse(open('utils/linkedin_client.py').read())"
          python -c "import ast; ast.parse(open('utils/pdf_converter.py').read())"
          python -c "import ast; ast.parse(open('agents/meeting_summarizer.py').read())"

      - name: 🔧 Test imports
        run: |
          python -c "from utils.gmail_client import GmailClient; print('✅ GmailClient OK')"
          python -c "from utils.linkedin_client import LinkedInClient; print('✅ LinkedInClient OK')"
          python -c "from utils.pdf_converter import pdf_converter; print('✅ PDFConverter OK')"

  # ==========================================
  # JOB 6: DOCKER BUILD (Optional)
  # ==========================================
  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image (test only)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: consulting-tools:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # JOB 7: NOTIFICATION
  # ==========================================
  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: [test, lint, security, dependencies, build]
    if: always()

    steps:
      - name: ✅ Success notification
        if: needs.test.result == 'success' && needs.build.result == 'success'
        run: |
          echo "🎉 All checks passed!"
          echo "- Tests: ${{ needs.test.result }}"
          echo "- Lint: ${{ needs.lint.result }}"
          echo "- Security: ${{ needs.security.result }}"
          echo "- Dependencies: ${{ needs.dependencies.result }}"
          echo "- Build: ${{ needs.build.result }}"

      - name: ❌ Failure notification
        if: needs.test.result == 'failure' || needs.build.result == 'failure'
        run: |
          echo "❌ Some checks failed!"
          echo "- Tests: ${{ needs.test.result }}"
          echo "- Lint: ${{ needs.lint.result }}"
          echo "- Security: ${{ needs.security.result }}"
          echo "- Dependencies: ${{ needs.dependencies.result }}"
          echo "- Build: ${{ needs.build.result }}"
          exit 1
