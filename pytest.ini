[pytest]
# Configuration pytest

# Répertoires de tests
testpaths = tests

# pytest-asyncio mode
asyncio_mode = auto

# Options par défaut
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --cov=agents
    --cov=utils
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=15

# Marqueurs personnalisés
markers =
    unit: Tests unitaires
    integration: Tests d'intégration
    security: Tests de sécurité
    slow: Tests lents (> 1s)
    api: Tests d'endpoints API
    agent: Tests d'agents IA
    asyncio: Tests asynchrones

# Patterns de fichiers de tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ignorer certains warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning

# Configuration de couverture
[coverage:run]
source = agents,utils
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */.venv/*
    */setup.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
