<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Consulting Tools Agents{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/ui-enhancements.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <span class="brand-w">W</span><span class="brand-rest">Envision</span>
                <span class="brand-tag">Agents IA</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if active == 'dashboard' %}active{% endif %}">Dashboard</a>
                <a href="/slide-editor" class="nav-link {% if active == 'slide-editor' %}active{% endif %}">Slide
                    Editor</a>
                <a href="/document-editor"
                    class="nav-link {% if active == 'document-editor' %}active{% endif %}">Documents</a>
                <a href="/veille" class="nav-link {% if active == 'veille' %}active{% endif %}">Veille Tech</a>
                <a href="/dataset" class="nav-link {% if active == 'dataset' %}active{% endif %}">Analyse Data</a>
                <a href="/elearning" class="nav-link {% if active == 'elearning' %}active{% endif %}">E-learning</a>
                <a href="/skills-market" class="nav-link {% if active == 'skills-market' %}active{% endif %}">Skills Market</a>
                <a href="/meeting-capture" class="nav-link {% if active == 'meeting-capture' %}active{% endif %}">Meeting Capture</a>
            </div>
            <div class="nav-actions">
                <select id="model-selector" class="model-selector" onchange="changeGeminiModel(this.value)"
                    title="Modele Gemini">
                    <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                    <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                    <option value="gemini-3-pro-preview">Gemini 3 Pro</option>
                    <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
                    <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
                    <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                </select>
                <a href="/logout" class="nav-logout" title="Deconnexion">Deconnexion</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-container" style="display: flex; justify-content: space-between; align-items: center;">
            <p>Consulting Tools Agents &mdash; Consultant : {{ consultant_name }}</p>
            <button onclick="openBugReportModal()" class="btn-bug-report" title="Signaler un bug">
                Signaler un bug
            </button>
        </div>
    </footer>

    <!-- Bug Report Modal -->
    <div id="bug-report-overlay" class="modal-overlay" style="display:none;">
        <div class="modal-card" onclick="event.stopPropagation()" style="max-width: 520px;">
            <h3>Signaler un bug</h3>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <div>
                    <label
                        style="font-size: 0.85rem; color: var(--gris-moyen, #888); display: block; margin-bottom: 0.3rem;">Description
                        du probleme *</label>
                    <textarea id="bug-description" rows="4" placeholder="Decrivez le probleme rencontre..."
                        style="width: 100%; padding: 0.6rem; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; resize: vertical;"></textarea>
                </div>
                <div>
                    <label
                        style="font-size: 0.85rem; color: var(--gris-moyen, #888); display: block; margin-bottom: 0.3rem;">Severite</label>
                    <select id="bug-severity"
                        style="width: 100%; padding: 0.6rem; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem;">
                        <option value="low">Faible - Mineur, contournable</option>
                        <option value="medium" selected>Moyenne - Genante mais fonctionnel</option>
                        <option value="high">Haute - Fonctionnalite cassee</option>
                        <option value="critical">Critique - Application inutilisable</option>
                    </select>
                </div>
                <div>
                    <label
                        style="font-size: 0.85rem; color: var(--gris-moyen, #888); display: block; margin-bottom: 0.3rem;">Capture
                        d'ecran (optionnel)</label>
                    <input type="file" id="bug-screenshot" accept="image/*,video/*" style="font-size: 0.85rem;">
                </div>
                <p style="font-size: 0.75rem; color: #aaa; margin: 0;">Page: <span id="bug-page-url"></span></p>
            </div>
            <div class="modal-actions" style="margin-top: 1.5rem;">
                <button onclick="closeBugReportModal()" class="btn btn-secondary">Annuler</button>
                <button onclick="submitBugReport()" id="btn-submit-bug" class="btn btn-primary">Envoyer</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script src="/static/ui-enhancements.js"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
